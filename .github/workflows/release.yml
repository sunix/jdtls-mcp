name: Release

# Trigger manually from the GitHub Actions UI.
# Enter the release version (e.g. 1.0.0) — no manual tagging or pom editing needed.
# The workflow will:
#   1. Bump all versions (pom.xml + MANIFEST.MF + .product) to <version>
#   2. Commit + tag v<version>
#   3. Build and publish a GitHub Release with per-platform archives
#   4. Bump versions to <next-snapshot> and commit
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
      next_version:
        description: 'Next development version (e.g. 1.0.1-SNAPSHOT — leave blank to auto-increment patch)'
        required: false

jobs:
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create a GitHub Release and push commits/tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT or the default GITHUB_TOKEN — fetch full history for the push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next snapshot version
        id: versions
        run: |
          VERSION="${{ github.event.inputs.version }}"
          NEXT="${{ github.event.inputs.next_version }}"
          if [ -z "$NEXT" ]; then
            # Auto-increment the patch segment: 1.0.0 -> 1.0.1-SNAPSHOT
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          fi
          echo "release_version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT"             >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"                  >> "$GITHUB_OUTPUT"

      # tycho-versions:set-version updates pom.xml files, MANIFEST.MF
      # (Bundle-Version), and .product version attributes atomically.
      - name: Set release version
        run: |
          mvn --batch-mode org.eclipse.tycho:tycho-versions-plugin:set-version \
            -DnewVersion="${{ steps.versions.outputs.release_version }}"

      - name: Commit release version
        run: |
          # Only stage what tycho-versions-plugin changed (pom.xml, MANIFEST.MF, .product).
          # Never 'git add -A' — build artifacts from a previous run could be lurking.
          git add '*.xml' '*/META-INF/MANIFEST.MF' '**/*.product'
          git commit -m "release: ${{ steps.versions.outputs.tag }}"

      - name: Tag release
        run: git tag "${{ steps.versions.outputs.tag }}"

      - name: Build with Maven / Tycho
        run: mvn --batch-mode package -DskipTests

      # -----------------------------------------------------------------------
      # Package each platform product directory into a named archive.
      # The archive root is always named "jdtls-mcp/" so users extract into a
      # predictable directory regardless of the platform ZIP layout.
      # -----------------------------------------------------------------------
      - name: Package platform archives
        run: |
          PROD="org.eclipse.jdt.ls.mcp.product/target/products/jdtls-mcp.product"
          TAG="${{ steps.versions.outputs.tag }}"   # e.g. v1.0.0

          # Write archives to RUNNER_TEMP so they are never inside the workspace
          # and cannot accidentally be committed by a subsequent git add.
          OUTDIR="$RUNNER_TEMP/archives"
          mkdir -p "$OUTDIR"

          # Helper: pack a product directory + scripts/ into a tar.gz.
          # The archive root is always "jdtls-mcp/" for a predictable extract path.
          pkg_tar() {
            local src="$1" out="$2"
            mkdir -p _pkg/jdtls-mcp
            cp -r "$src"/. _pkg/jdtls-mcp/
            cp -r scripts   _pkg/jdtls-mcp/scripts
            tar -czf "$out" -C _pkg jdtls-mcp
            rm -rf _pkg
          }

          pkg_tar "$PROD/linux/gtk/x86_64"     "$OUTDIR/jdtls-mcp-${TAG}-linux-x86_64.tar.gz"
          pkg_tar "$PROD/linux/gtk/aarch64"    "$OUTDIR/jdtls-mcp-${TAG}-linux-aarch64.tar.gz"
          pkg_tar "$PROD/macosx/cocoa/x86_64"  "$OUTDIR/jdtls-mcp-${TAG}-macos-x86_64.tar.gz"
          pkg_tar "$PROD/macosx/cocoa/aarch64" "$OUTDIR/jdtls-mcp-${TAG}-macos-aarch64.tar.gz"

          # Windows: use zip
          mkdir -p _pkg/jdtls-mcp
          cp -r "$PROD/win32/win32/x86_64"/. _pkg/jdtls-mcp/
          cp -r scripts _pkg/jdtls-mcp/scripts
          (cd _pkg && zip -qr "$OUTDIR/jdtls-mcp-${TAG}-windows-x86_64.zip" jdtls-mcp)
          rm -rf _pkg

          # Export the output directory path for subsequent steps
          echo "ARCHIVES=$OUTDIR" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versions.outputs.tag }}
          name: "jdtls-mcp ${{ steps.versions.outputs.tag }}"
          # Archives live in RUNNER_TEMP, outside the workspace
          body: |
            ## Installation

            Download the archive for your platform, extract it, and run the server:

            **Linux / macOS**
            ```bash
            tar xzf jdtls-mcp-${{ steps.versions.outputs.tag }}-linux-x86_64.tar.gz
            cd jdtls-mcp
            # start against your Java workspace
            ./scripts/start-mcp-server.sh /path/to/your-java-project
            ```

            **Windows**
            ```
            Expand-Archive jdtls-mcp-${{ steps.versions.outputs.tag }}-windows-x86_64.zip
            cd jdtls-mcp
            java -Declipse.application=org.eclipse.jdt.ls.mcp.app -Dosgi.bundles.defaultStartLevel=4 -jar plugins\org.eclipse.equinox.launcher_*.jar -configuration configuration -data C:\path\to\your-java-project
            ```

            ## MCP client configuration

            ### GitHub Copilot Coding Agent (zero-install)

            Paste this into **GitHub Settings → Copilot → Model Context Protocol (MCP)**
            — no manual download required:
            ```json
            {
              "mcpServers": {
                "jdtls": {
                  "type": "stdio",
                  "command": "bash",
                  "args": [
                    "-c",
                    "f=$(mktemp /tmp/jdtls-mcp-bootstrap-XXXXXX.sh) && curl -fsSL https://raw.githubusercontent.com/sunix/jdtls-mcp/main/scripts/download-and-start.sh -o \"$f\" && chmod +x \"$f\" && exec \"$f\""
                  ]
                }
              }
            }
            ```

            ### VS Code / other local clients

            Add to your MCP client config (e.g. `.vscode/mcp.json`):
            ```json
            {
              "servers": {
                "jdtls": {
                  "type": "stdio",
                  "command": "/path/to/jdtls-mcp/scripts/start-mcp-server.sh",
                  "args": ["/path/to/your-java-project"]
                }
              }
            }
            ```

            Startup takes ~60 s on first run while Maven imports the project and
            the JDT index warms up.
          files: |
            ${{ env.ARCHIVES }}/jdtls-mcp-${{ steps.versions.outputs.tag }}-linux-x86_64.tar.gz
            ${{ env.ARCHIVES }}/jdtls-mcp-${{ steps.versions.outputs.tag }}-linux-aarch64.tar.gz
            ${{ env.ARCHIVES }}/jdtls-mcp-${{ steps.versions.outputs.tag }}-macos-x86_64.tar.gz
            ${{ env.ARCHIVES }}/jdtls-mcp-${{ steps.versions.outputs.tag }}-macos-aarch64.tar.gz
            ${{ env.ARCHIVES }}/jdtls-mcp-${{ steps.versions.outputs.tag }}-windows-x86_64.zip

      # -----------------------------------------------------------------------
      # Push the release tag and then bump to next snapshot so main stays
      # ahead of the tag.
      # -----------------------------------------------------------------------
      - name: Set next snapshot version
        run: |
          mvn --batch-mode org.eclipse.tycho:tycho-versions-plugin:set-version \
            -DnewVersion="${{ steps.versions.outputs.next_version }}"

      - name: Commit next snapshot version
        run: |
          git add '*.xml' '*/META-INF/MANIFEST.MF' '**/*.product'
          git commit -m "chore: prepare next development version ${{ steps.versions.outputs.next_version }}"

      - name: Push tag and snapshot commit
        run: git push --follow-tags origin HEAD:${{ github.ref_name }}
