# This workflow runs the setup steps that the GitHub Copilot coding agent
# needs before it can start MCP servers.
#
# jdtls-mcp requires Java 21. GitHub-hosted runners ship multiple JDKs;
# this step ensures java 21 is on PATH and JAVA_HOME is set to it before
# the MCP server starts.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
